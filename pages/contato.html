<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - TripWay</title>
</head>
<body>
    <header>
        <h1>TripWay</h1>
        <p>Seu guia completo de viagens</p>
    </header>

    <nav>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="destinos.html">Destinos</a></li>
            <li><a href="pacotes.html">Pacotes</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Entre em Contato ou Faça sua Reserva</h2>
            <img src="../images/contato.jpg" alt="Atendimento ao cliente TripWay">
            <p>Preencha o formulário abaixo e nossa equipe entrará em contato com você em até 24 horas.</p>
        </section>

        <section>
            <h3>Formulário de Reserva</h3>
            <form action="#" method="post">
                
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required>
                <br><br>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
                <br><br>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone">
                <br><br>

            </form>
        </section>
    </main>

</body>
</html>
